<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎂 HAPPY SEOHYUN DAY! 🎂</title>
    <style>
        body {
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            background: linear-gradient(135deg, #fff5f7, #ffe4e1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            color: #ff4d6d;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.05);
            margin-bottom: 10px;
            font-size: 2.2rem;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #6366f1;
            margin-bottom: 45px;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.6);
            padding: 8px 20px;
            border-radius: 50px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .card-container {
            display: flex;
            gap: 25px;
        }

        .card {
            width: 160px;
            height: 250px;
            perspective: 1000px;
            cursor: pointer;
        }

        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 25px rgba(255, 77, 109, 0.2);
            border-radius: 25px;
        }

        .card:active .card-inner {
            transform: scale(0.95);
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 25px;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        .card-front {
            background: #ff758f;
            color: white;
            font-size: 3rem;
            border: 4px solid white;
        }

        .card-back {
            background: white;
            color: #333;
            transform: rotateY(180deg);
            border: 4px solid #ff758f;
            font-size: 0.95rem;
            font-weight: bold;
            line-height: 1.6;
            white-space: pre-line;
        }

        .result-box {
            margin-top: 50px;
            font-size: 1.3rem; /* 멘트가 길어져서 가독성을 위해 크기를 살짝 조절했습니다 */
            font-weight: bold;
            color: #ff4d6d;
            min-height: 40px;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>🎉 서혀니의 생일을 축하합니다 🎉</h1>
    <div class="subtitle">✨승여니가 봐주는 서혀니의 운세✨</div>

    <div class="card-container">
        <div class="card" onclick="flipCard(this, 0)">
            <div class="card-inner">
                <div class="card-front">🎁</div>
                <div class="card-back" id="fortune-0"></div>
            </div>
        </div>
        <div class="card" onclick="flipCard(this, 1)">
            <div class="card-inner">
                <div class="card-front">🎂</div>
                <div class="card-back" id="fortune-1"></div>
            </div>
        </div>
        <div class="card" onclick="flipCard(this, 2)">
            <div class="card-inner">
                <div class="card-front">💖</div>
                <div class="card-back" id="fortune-2"></div>
            </div>
        </div>
    </div>

    <div class="result-box" id="result-text">끌리는 카드 하나 골라!😎</div>

    <script>
        const birthdayFortunes = [
            "🍕\n음식의 유혹이 강한 날!\n맛난걸 먹어보세용",
            "🍀💕\n21번째 생일을 맞이해\n행운 +22 적립",
            "💰\n올해의 로또당첨번호 추천..\n(( 6, 13, 22... + 🔮"
        ];

        // 페이지가 열리자마자 카드 뒷면에 미리 텍스트를 다 넣어둡니다.
        for (let i = 0; i < birthdayFortunes.length; i++) {
            document.getElementById(`fortune-${i}`).innerText = birthdayFortunes[i];
        }

        function flipCard(cardElement, index) {
            // 카드를 뒤집거나 다시 되돌림
            cardElement.classList.toggle('flipped');

            // 카드가 하나라도 뒤집혀 있으면 새로운 축하 멘트로 변경, 다 닫히면 기본 멘트로 변경
            setTimeout(() => {
                const flippedCards = document.querySelectorAll('.card.flipped');
                if (flippedCards.length > 0) {
                    document.getElementById('result-text').innerText = "🥰서혀니의 스물둘도 찬란하길 바랍니당 최고로 행복한 하루 보내💕";
                } else {
                    document.getElementById('result-text').innerText = "끌리는 카드 하나 골라!😎";
                }
            }, 150);
        }
    </script>
</body>
</html>
